<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé de la Pierre (Stone) -->
    <linearGradient id="stone_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    
    <!-- Ombre portée pour donner du relief -->
    <filter id="soft_shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Forme de Pierre Hexagonale (The Stone) -->
  <path d="M256 40L430 140V340L256 440L82 340V140L256 40Z" fill="url(#stone_grad)" filter="url(#soft_shadow)"/>

  <!-- Corps de l'Agenda (Style épuré) -->
  <rect x="166" y="170" width="180" height="150" rx="16" fill="white" fill-opacity="0.1"/>
  
  <!-- Les Anneaux (Reliure) -->
  <rect x="200" y="150" width="12" height="40" rx="6" fill="#FACC15"/>
  <rect x="300" y="150" width="12" height="40" rx="6" fill="#FACC15"/>

  <!-- Le Checkmark (La validation Ag) -->
  <path d="M190 250L240 300L340 180" stroke="#FACC15" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft_shadow)"/>

  <!-- Texte Typographique Intégré -->
  <text x="256" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="52" fill="#1E1B4B">
    AG<tspan fill="#4F46E5">STONE</tspan>
  </text>
</svg>